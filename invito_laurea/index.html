<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#fdfbf6">
  <title>Festeggia con me · 01 agosto</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    :root {
      /* ---- Design tokens ---- */
      --bg:        #fdfbf6;   /* bianco caldo */
      --bg-soft:   #f6f1e6;
      --ink:       #1b1a16;   /* nero caldo */
      --ink-soft:  #4a463d;
      --gold:      #b8912f;   /* oro decorativo */
      --gold-lite: #e8cf7a;
      --gold-ink:  #7a5e12;   /* oro leggibile (AA su bianco) per testo piccolo */

      --serif:  "Cormorant Garamond", Georgia, serif;
      --script: "Great Vibes", "Cormorant Garamond", cursive;

      --ease: cubic-bezier(.22,.61,.36,1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--serif);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    /* ---- Contenitore scroll-snap verticale ---- */
    .snap {
      height: 100vh;
      height: 100dvh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: none;
      scroll-behavior: smooth;
      scrollbar-width: none;
    }
    .snap::-webkit-scrollbar { display: none; }

    section {
      position: relative;
      height: 100vh;
      height: 100dvh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: clamp(1.5rem, 6vw, 4rem);
      overflow: hidden;
    }

    /* Sezioni testo: sfondo bianco con un alone caldo appena percettibile */
    .text-section {
      background:
        radial-gradient(120% 90% at 50% 42%, #fffdf9 0%, var(--bg) 62%);
    }

    /* ---- 1 · Video ---- */
    .video-section { padding: 0; background: #000; }
    .video-section video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .video-section::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(to bottom,
                  rgba(0,0,0,.10) 0%, transparent 22%,
                  transparent 72%, rgba(0,0,0,.42) 100%);
    }
    .scroll-hint {
      position: absolute; left: 50%;
      bottom: max(2.2rem, env(safe-area-inset-bottom));
      transform: translateX(-50%); z-index: 2;
      display: flex; flex-direction: column; align-items: center; gap: .55rem;
      color: #fff; letter-spacing: .28em; font-size: .72rem;
      text-transform: uppercase; opacity: .95;
      text-shadow: 0 1px 10px rgba(0,0,0,.55);
      filter: drop-shadow(0 2px 8px rgba(0,0,0,.4));
      pointer-events: none;
      transition: opacity .45s ease, visibility .45s ease;
    }
    .scroll-hint.hidden { opacity: 0; visibility: hidden; }
    .scroll-hint svg {
      width: 30px; height: 30px; stroke: currentColor;
      animation: bounce-down 2s ease-in-out infinite;
    }
    @keyframes bounce-down {
      0%, 100% { transform: translateY(0); opacity: .75; }
      50%      { transform: translateY(9px); opacity: 1; }
    }
    @keyframes floaty {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%     { transform: translateX(-50%) translateY(4px); }
    }
    .scroll-hint { animation: floaty 2.4s ease-in-out infinite; }
    .scroll-hint--light {
      color: var(--gold-ink);
      text-shadow: none;
      filter: none;
      opacity: .88;
    }
    .map-section .scroll-hint {
      bottom: max(6.4rem, calc(env(safe-area-inset-bottom) + 4.2rem));
      color: var(--ink);
      text-shadow: 0 1px 8px rgba(255,255,255,.85);
      filter: drop-shadow(0 2px 6px rgba(255,255,255,.6));
    }

    /* ---- Tipografia ---- */
    .content {
      position: relative; z-index: 2;
      width: 100%; max-width: 620px; min-width: 0;
      display: flex; flex-direction: column; align-items: center;
    }
    .content > * { max-width: 100%; overflow-wrap: break-word; }

    .kicker {
      display: inline-block;
      font-size: clamp(.84rem, 3.4vw, 1.06rem);
      letter-spacing: .38em; text-transform: uppercase;
      color: var(--gold-ink); font-weight: 500;
      padding-left: .38em;   /* compensa lo spazio finale del letter-spacing */
    }

    .headline {
      font-family: var(--script); font-weight: 400;
      font-size: clamp(3.4rem, 16vw, 7.2rem); line-height: 1.02;
      letter-spacing: .01em; margin-top: .1rem;
      background: linear-gradient(175deg, var(--gold-lite) 0%, var(--gold) 46%, #8a6d1f 100%);
      -webkit-background-clip: text; background-clip: text;
      color: transparent;
      padding: 0 .06em .14em;   /* spazio per le aste discendenti (g, y) */
      width: fit-content; max-width: 100%;
      text-align: center; text-wrap: balance;
    }

    .laurel-divider { width: clamp(172px, 52vw, 264px); height: auto; margin: clamp(1rem,4vw,1.6rem) auto; }

    .date {
      font-weight: 400; font-size: clamp(3.2rem, 15vw, 6.4rem);
      line-height: 1.12; letter-spacing: .04em;
      width: fit-content; max-width: 100%;
      text-align: center;
      padding-left: .04em;
    }
    .date .day { color: var(--gold); }
    .date .time {
      display: block; margin-top: .32em;
      font-weight: 300; font-size: .56em;
      color: var(--gold-ink); letter-spacing: .12em;
      padding-left: .12em;
      font-variant-numeric: tabular-nums;
    }

    .place {
      font-weight: 500; font-size: clamp(2.6rem, 11vw, 4.8rem);
      line-height: 1.12; letter-spacing: .02em;
      text-wrap: balance;
      width: fit-content; max-width: 100%;
      text-align: center;
      padding-left: .02em;
    }
    .place .city {
      display: block; margin-top: .32em;
      font-weight: 300; font-style: italic; font-size: .56em;
      color: var(--gold-ink); letter-spacing: .16em;
      padding-left: .16em;
    }

    /* ---- Brillantini dorati ---- */
    .sparkles { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
    .spk {
      position: absolute; display: block;
      background: linear-gradient(160deg, var(--gold-lite), var(--gold));
      clip-path: polygon(50% 0%, 60% 40%, 100% 50%, 60% 60%,
                         50% 100%, 40% 60%, 0% 50%, 40% 40%);
      opacity: 0; transform: scale(.3) rotate(0deg);
      animation: twinkle 3.4s var(--ease) infinite;
      will-change: transform, opacity;
      filter: drop-shadow(0 0 3px rgba(184,145,47,.35));
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0;   transform: scale(.3)  rotate(0deg); }
      50%      { opacity: .95; transform: scale(1)   rotate(90deg); }
    }

    /* ---- 5 · Mappa ---- */
    .map-section { padding: 0; background: var(--bg-soft); }
    .map-section iframe {
      position: absolute; inset: 0; width: 100%; height: 100%;
      border: 0; filter: saturate(.92);
    }
    .map-label {
      position: absolute; top: max(1.5rem, env(safe-area-inset-top));
      left: 50%; transform: translateX(-50%); z-index: 2;
      padding: .55rem 1.2rem;
      background: rgba(253,251,246,.9);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(184,145,47,.5); border-radius: 999px;
      color: var(--ink);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: .74rem; font-weight: 500; letter-spacing: .18em;
      text-transform: uppercase; white-space: nowrap;
      box-shadow: 0 6px 22px rgba(0,0,0,.10);
    }
    .map-cta {
      position: absolute; bottom: max(2rem, env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%); z-index: 2;
      display: inline-flex; align-items: center; gap: .5rem;
      min-height: 48px; padding: .8rem 1.5rem;
      background: #ffffff; color: var(--ink); text-decoration: none;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-weight: 600; font-size: 1rem; letter-spacing: .01em;
      border: 1px solid rgba(184,145,47,.35); border-radius: 999px;
      box-shadow: 0 10px 28px rgba(0,0,0,.16);
      transition: transform .18s var(--ease), box-shadow .18s var(--ease);
    }
    .map-cta:hover { box-shadow: 0 14px 34px rgba(0,0,0,.22); }
    .map-cta:active { transform: translateX(-50%) scale(.97); }
    .map-cta svg { width: 17px; height: 17px; stroke: currentColor; fill: none; }

    /* Focus visibile (accessibilità) */
    a:focus-visible {
      outline: 3px solid var(--gold-ink); outline-offset: 3px; border-radius: 6px;
    }

    /* ---- Rivelazione all'ingresso ---- */
    .reveal { opacity: 0; transform: translateY(26px); transition: opacity 1s ease, transform 1s var(--ease); }
    .reveal.in { opacity: 1; transform: none; }
    .reveal.d1 { transition-delay: .14s; }
    .reveal.d2 { transition-delay: .28s; }

    @media (prefers-reduced-motion: reduce) {
      .reveal { opacity: 1; transform: none; transition: none; }
      .scroll-hint { animation: none; }
      .scroll-hint svg { animation: none; opacity: .9; }
      .spk { animation: none; opacity: .7; transform: scale(.9); }
      .snap { scroll-behavior: auto; }
    }
  </style>
</head>
<body>
  <main class="snap">

    <!-- 1 · Video -->
    <section class="video-section">
      <video id="introVideo" autoplay muted playsinline preload="auto" poster="assets/poster.jpg">
        <source src="assets/invito.mp4" type="video/mp4">
      </video>
      <div class="scroll-hint" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 7l6 6 6-6"/>
          <path d="M6 13l6 6 6-6"/>
        </svg>
      </div>
    </section>

    <!-- 2 · Testo principale -->
    <section id="s2" class="text-section">
      <div class="sparkles" aria-hidden="true">
        <i class="spk" style="left:14%;top:20%;width:16px;height:16px;animation-delay:0s"></i>
        <i class="spk" style="left:82%;top:24%;width:11px;height:11px;animation-delay:.9s"></i>
        <i class="spk" style="left:78%;top:70%;width:20px;height:20px;animation-delay:1.7s"></i>
        <i class="spk" style="left:20%;top:74%;width:9px;height:9px;animation-delay:.4s"></i>
        <i class="spk" style="left:50%;top:12%;width:13px;height:13px;animation-delay:2.3s"></i>
        <i class="spk" style="left:10%;top:52%;width:8px;height:8px;animation-delay:1.2s"></i>
        <i class="spk" style="left:90%;top:50%;width:10px;height:10px;animation-delay:2.8s"></i>
      </div>
      <div class="content">
        <p class="kicker reveal">— sei invitato —</p>
        <img class="laurel-divider reveal d1" src="assets/laurel-divider.svg" alt="" aria-hidden="true">
        <h1 class="headline reveal d2">Festeggia<br>con me</h1>
      </div>
      <div class="scroll-hint scroll-hint--light" aria-hidden="true">
        <span>scorri</span>
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 7l6 6 6-6"/>
          <path d="M6 13l6 6 6-6"/>
        </svg>
      </div>
    </section>

    <!-- 3 · Data -->
    <section id="s3" class="text-section">
      <div class="sparkles" aria-hidden="true">
        <i class="spk" style="left:22%;top:30%;width:14px;height:14px;animation-delay:.2s"></i>
        <i class="spk" style="left:76%;top:34%;width:10px;height:10px;animation-delay:1.5s"></i>
        <i class="spk" style="left:68%;top:66%;width:18px;height:18px;animation-delay:2.4s"></i>
        <i class="spk" style="left:30%;top:64%;width:9px;height:9px;animation-delay:.8s"></i>
        <i class="spk" style="left:52%;top:22%;width:11px;height:11px;animation-delay:1.9s"></i>
      </div>
      <div class="content">
        <p class="kicker reveal">Save the date</p>
        <img class="laurel-divider reveal d1" src="assets/laurel-divider.svg" alt="" aria-hidden="true">
        <p class="date reveal d2"><span class="day">01</span> agosto<span class="time">20:30</span></p>
      </div>
      <div class="scroll-hint scroll-hint--light" aria-hidden="true">
        <span>scorri</span>
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 7l6 6 6-6"/>
          <path d="M6 13l6 6 6-6"/>
        </svg>
      </div>
    </section>

    <!-- 4 · Luogo -->
    <section id="s4" class="text-section">
      <div class="sparkles" aria-hidden="true">
        <i class="spk" style="left:18%;top:28%;width:15px;height:15px;animation-delay:.6s"></i>
        <i class="spk" style="left:80%;top:32%;width:10px;height:10px;animation-delay:1.3s"></i>
        <i class="spk" style="left:72%;top:70%;width:19px;height:19px;animation-delay:2.1s"></i>
        <i class="spk" style="left:26%;top:70%;width:9px;height:9px;animation-delay:.3s"></i>
        <i class="spk" style="left:50%;top:16%;width:12px;height:12px;animation-delay:2.6s"></i>
      </div>
      <div class="content">
        <p class="kicker reveal">Dove</p>
        <img class="laurel-divider reveal d1" src="assets/laurel-divider.svg" alt="" aria-hidden="true">
        <p class="place reveal d2">Villa<br>Romanazzi<span class="city">Bari</span></p>
      </div>
      <div class="scroll-hint scroll-hint--light" aria-hidden="true">
        <span>scorri</span>
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 7l6 6 6-6"/>
          <path d="M6 13l6 6 6-6"/>
        </svg>
      </div>
    </section>

    <!-- 5 · Mappa -->
    <section id="s5" class="map-section">
      <div class="map-label">Come raggiungerci</div>
      <iframe
        title="Mappa di Villa Romanazzi Carlucci, Bari"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        allowfullscreen
        src="https://www.google.com/maps?q=Villa%20Romanazzi%20Carlucci%2C%20Largo%20Adige%2C%2070124%20Bari%20BA&z=16&output=embed"></iframe>
      <a class="map-cta"
         href="https://www.google.com/maps/dir/?api=1&destination=Villa+Romanazzi+Carlucci,+Largo+Adige,+70124+Bari+BA"
         target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Apri con Google Maps
      </a>
      <div class="scroll-hint" aria-hidden="true">
        <span>scorri</span>
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 7l6 6 6-6"/>
          <path d="M6 13l6 6 6-6"/>
        </svg>
      </div>
    </section>

  </main>

  <script>
    const scroller = document.querySelector('.snap');
    const sections = [...document.querySelectorAll('.snap > section')];
    const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

    sections.forEach((section, index) => {
      const hint = section.querySelector('.scroll-hint');
      if (!hint) return;
      if (index === sections.length - 1) {
        hint.classList.add('hidden');
        return;
      }
      const hintObserver = new IntersectionObserver(([entry]) => {
        hint.classList.toggle('hidden', !entry.isIntersecting);
      }, { root: scroller, threshold: 0.55 });
      hintObserver.observe(section);
    });

    /* dev helper: ?goto=N jumps istantly to section N (per screenshot/QA) */
    const goto = new URLSearchParams(location.search).get('goto');
    if (goto !== null && sections[+goto]) {
      requestAnimationFrame(() => {
        const prev = scroller.style.scrollBehavior;
        scroller.style.scrollBehavior = 'auto';
        scroller.scrollTop = sections[+goto].offsetTop;
        scroller.style.scrollBehavior = prev;
      });
    }

    /* Rivela i testi quando la sezione entra in vista */
    const reveal = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        e.target.querySelectorAll('.reveal')
          .forEach(el => el.classList.toggle('in', e.isIntersecting));
      });
    }, { root: scroller, threshold: 0.5 });
    document.querySelectorAll('.text-section').forEach(s => reveal.observe(s));

    /* ---- Video: parte da solo, con audio appena il browser lo consente ---- */
    const video = document.getElementById('introVideo');
    if (video) {
      video.volume = 1;

      // 1) Tenta subito l'avvio CON audio (funziona su desktop / dove è permesso).
      // 2) Se il browser lo blocca, parte comunque (muto) e l'audio si attiva
      //    automaticamente al primo tocco/scroll — senza alcun pulsante.
      (async () => {
        try {
          video.muted = false;
          await video.play();
        } catch {
          video.muted = true;
          try { await video.play(); } catch {}
          const enableAudio = () => { video.muted = false; video.volume = 1; };
          ['pointerdown', 'touchstart', 'click', 'keydown'].forEach(ev =>
            window.addEventListener(ev, enableAudio, { once: true, passive: true }));
          scroller.addEventListener('scroll', enableAudio, { once: true, passive: true });
        }
      })();

      let autoAdvanced = false;
      video.addEventListener('ended', () => {
        if (!autoAdvanced) {                     // avanza una sola volta, senza "intrappolare"
          autoAdvanced = true;
          sections[1].scrollIntoView({ behavior: reduceMotion ? 'auto' : 'smooth', block: 'start' });
        }
      });

      /* Rigioca il video (con audio) tornando sulla prima sezione */
      const vObserver = new IntersectionObserver((entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) { video.currentTime = 0; video.play().catch(() => {}); }
          else video.pause();
        });
      }, { root: scroller, threshold: 0.6 });
      vObserver.observe(sections[0]);
    }
  </script>
</body>
</html>
